<!doctype html>
<meta charset="utf-8">
<title>AIDEMA mobile card test</title>
<style>html,body{margin:0;background:#ddd}iframe{display:block;width:390px;height:844px;border:0}</style>
<iframe id="site" src="index.html"></iframe>
<pre id="result">waiting</pre>
<script>
  const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
  const assert = (condition, message) => {
    if (!condition) throw new Error(message);
  };

  document.querySelector("#site").addEventListener("load", async (event) => {
    const frame = event.target;
    const doc = frame.contentDocument;
    const win = frame.contentWindow;
    const result = document.querySelector("#result");

    try {
      await wait(130);
      const cards = doc.querySelectorAll("[data-product-card]");
      const firstCard = cards[0];
      const secondCard = cards[1];
      const media = firstCard.querySelector(".product-media");
      const description = firstCard.querySelector(".product-description");
      const swatch = firstCard.querySelector(".color-swatch");

      doc.scrollingElement.scrollTop = firstCard.getBoundingClientRect().top + doc.scrollingElement.scrollTop;
      await wait(40);

      assert(cards.length > 1, "not enough cards");
      assert(Math.abs(media.getBoundingClientRect().height / media.getBoundingClientRect().width - 0.8) < 0.03, "mobile image was not reduced by 20%");
      assert(win.getComputedStyle(description).webkitLineClamp === "2", "description is not limited to two lines");
      assert(win.getComputedStyle(swatch).width === "30px", "color target is not enlarged");
      assert(firstCard.querySelector(".product-price").getBoundingClientRect().bottom < win.innerHeight, `price is below the first viewport: ${Math.round(firstCard.querySelector(".product-price").getBoundingClientRect().bottom)} / card ${Math.round(firstCard.getBoundingClientRect().height)}`);
      assert(firstCard.querySelector(".stock-status").getBoundingClientRect().bottom < win.innerHeight, "stock status is below the first viewport");
      assert(firstCard.querySelector(".whatsapp-button").getBoundingClientRect().bottom < win.innerHeight, "WhatsApp button is below the first viewport");
      assert(secondCard.getBoundingClientRect().top < win.innerHeight, "next card does not appear in the viewport");
      assert(doc.documentElement.scrollWidth <= doc.documentElement.clientWidth, "page has horizontal overflow");

      result.textContent = "PASS: one column, compact image, two-line description, quick actions and next card preview";
      document.title = "PASS";
    } catch (error) {
      result.textContent = `FAIL: ${error.message}`;
      document.title = "FAIL";
    }
  });
</script>
